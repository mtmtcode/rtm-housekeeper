name: Build and Release (latest)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./...

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p dist
          ext=""
          if [ "${GOOS}" = "windows" ]; then
            ext=".exe"
          fi
          output="rtm-housekeeper-${GOOS}-${GOARCH}${ext}"
          go build -trimpath -ldflags="-s -w" -o "dist/${output}" .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: rtm-housekeeper-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create or update latest release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: latest
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          replacesArtifacts: true
          artifacts: "dist/*"
          body: |
            Automated latest build from `${{ github.sha }}`.
